name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --user --upgrade buildozer "cython<3.0.0" virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # مسح الفولدر القديم عشان نضمن النظافة
          rm -rf .buildozer
          # بنوافق على كل حاجة وبنبني
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v3  # رجعنا لنسخة 3 المستقرة جداً
        with:
          name: XO-Neon-APK
          path: bin/*.apk
          
